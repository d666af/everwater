<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Ever — Доставка чистой воды</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="icon" href="https://i.ibb.co/qwn4Bwz/Ever-Jpg.jpg" />
    <link rel="preload" as="image" href="https://i.ibb.co/qwn4Bwz/Ever-Jpg.jpg" fetchpriority="high" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

      :root {
        --c: #7CB342;
        --c-dark: #558B2F;
        --c-light: #AED581;
        --c-pale: #F1F8E9;
        --c-glow: rgba(124,179,66,0.25);

        --bg: #FAFAFA;
        --bg-card: #FFFFFF;
        --bg-elevated: #FFFFFF;

        --text: #212121;
        --text-2: #757575;
        --text-3: #BDBDBD;

        --border: rgba(0,0,0,0.06);
        --border-focus: rgba(124,179,66,0.4);

        --danger: #EF5350;
        --warning: #FFA726;
        --success: #66BB6A;
        --info: #42A5F5;

        --r-sm: 10px;
        --r-md: 14px;
        --r-lg: 18px;
        --r-xl: 24px;
        --r-full: 999px;

        --shadow-xs: 0 1px 2px rgba(0,0,0,0.04);
        --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
        --shadow-md: 0 4px 20px rgba(0,0,0,0.08);
        --shadow-lg: 0 8px 40px rgba(0,0,0,0.12);
        --shadow-c: 0 4px 20px rgba(124,179,66,0.3);

        --tg-theme-bg-color: #FAFAFA;
        --tg-theme-text-color: #212121;
        --tg-theme-button-color: #7CB342;
        --tg-theme-button-text-color: #ffffff;
        --tg-theme-hint-color: #757575;
        --tg-theme-secondary-bg-color: #F5F5F5;
      }

      html { -webkit-text-size-adjust: 100%; }
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-x: hidden;
      }
      button, input, textarea, select { font-family: inherit; }

      ::-webkit-scrollbar { width: 0; height: 0; }

      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes slideUp { from { opacity: 0; transform: translateY(100%); } to { opacity: 1; transform: translateY(0); } }
      @keyframes slideDown { from { opacity: 0; transform: translateY(-20px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
      @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
      @keyframes scaleIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
      @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
      @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
      @keyframes typingBounce { 0%,60%,100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-5px); opacity: 1; } }

      button { cursor: pointer; -webkit-tap-highlight-color: transparent; }
      button:disabled { cursor: not-allowed; opacity: 0.5; }

      /* Splash */
      #splash {
        position: fixed; inset: 0; background: #fff; z-index: 9999;
        display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
        transition: opacity 0.4s ease, transform 0.4s ease;
      }
      #splash.hide { opacity: 0; transform: scale(1.03); pointer-events: none; }
      #splash-logo { animation: float 2s ease-in-out infinite; }
      #splash-bar { width: 100px; height: 3px; background: #EEEEEE; border-radius: 2px; overflow: hidden; }
      #splash-fill { height: 100%; width: 0; background: var(--c); border-radius: 2px; animation: splashLoad 1s cubic-bezier(0.4,0,0.2,1) forwards; }
      @keyframes splashLoad { 0% { width: 0; } 60% { width: 80%; } 100% { width: 100%; } }

      @media (max-width: 768px) { .desktop-only { display: none !important; } }
      @media (min-width: 769px) { .mobile-nav { display: none !important; } }
    </style>
  </head>
  <body>
    <div id="splash">
      <div id="splash-logo">
        <img src="https://i.ibb.co/qwn4Bwz/Ever-Jpg.jpg" alt="Ever" width="96"
          fetchpriority="high" decoding="sync"
          style="object-fit: contain; border-radius: 20px; display: block; box-shadow: 0 8px 32px rgba(0,0,0,0.1);" />
      </div>
      <div id="splash-bar"><div id="splash-fill"></div></div>
    </div>
    <script>
      var _preImg = new Image();
      _preImg.src = 'https://i.ibb.co/qwn4Bwz/Ever-Jpg.jpg';
      function _hideSplash() {
        var s = document.getElementById('splash');
        if (s) { s.classList.add('hide'); setTimeout(function() { if (s.parentNode) s.parentNode.removeChild(s); }, 450); }
      }
      var _splashTimer = setTimeout(_hideSplash, 1500);
      _preImg.onload = function() { clearTimeout(_splashTimer); setTimeout(_hideSplash, 200); };
      _preImg.onerror = function() { clearTimeout(_splashTimer); setTimeout(_hideSplash, 300); };
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
