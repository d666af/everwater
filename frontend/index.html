<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Everwater — Доставка чистой воды</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💧</text></svg>" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

      :root {
        --ew-green: #2d6a4f;
        --ew-green-light: #52b788;
        --ew-green-pale: #d8f3dc;
        --ew-green-bg: #f5faf7;
        --ew-dark: #1b4332;
        --tg-theme-bg-color: #ffffff;
        --tg-theme-text-color: #1b4332;
        --tg-theme-button-color: #2d6a4f;
        --tg-theme-button-text-color: #ffffff;
        --tg-theme-hint-color: #b7e4c7;
        --tg-theme-secondary-bg-color: #f5faf7;
      }

      html { -webkit-text-size-adjust: 100%; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
        background: var(--tg-theme-bg-color, #fff);
        color: var(--tg-theme-text-color, #1b4332);
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
      }
      button, input, textarea, select { font-family: inherit; }
      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #b7e4c7; border-radius: 2px; }
      @keyframes spin { to { transform: rotate(360deg); } }
      @media (max-width: 768px) { .desktop-only { display: none !important; } }
      @media (min-width: 769px) { .mobile-nav { display: none !important; } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
