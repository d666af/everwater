<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Ever — Доставка воды</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="icon" href="https://i.ibb.co/qwn4Bwz/Ever-Jpg.jpg" />
    <link rel="preload" as="image" href="https://i.ibb.co/qwn4Bwz/Ever-Jpg.jpg" fetchpriority="high" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

      :root {
        --c: #8DC63F;
        --bg: #fafafa;
        --text: #111;
        --text-2: #888;
        --text-3: #bbb;
        --border: rgba(0,0,0,0.06);
        --danger: #ef4444;

        --tg-theme-bg-color: #fafafa;
        --tg-theme-text-color: #111;
        --tg-theme-button-color: #8DC63F;
        --tg-theme-button-text-color: #ffffff;
        --tg-theme-hint-color: #888;
        --tg-theme-secondary-bg-color: #f7f7f8;
      }

      html { -webkit-text-size-adjust: 100%; }
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100dvh;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-x: hidden;
      }
      button, input, textarea, select { font-family: inherit; }

      ::-webkit-scrollbar { width: 0; height: 0; }

      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes slideUp { from { opacity: 0; transform: translateY(100%); } to { opacity: 1; transform: translateY(0); } }
      @keyframes slideDown { from { opacity: 0; transform: translateY(-16px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
      @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
      @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
      @keyframes typingBounce { 0%,60%,100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-5px); opacity: 1; } }

      button { cursor: pointer; -webkit-tap-highlight-color: transparent; }
      button:disabled { cursor: not-allowed; opacity: 0.5; }

      /* Splash */
      #splash {
        position: fixed; inset: 0; background: #fff; z-index: 9999;
        display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
        transition: opacity 0.3s ease;
      }
      #splash.hide { opacity: 0; pointer-events: none; }
      #splash-bar { width: 80px; height: 3px; background: #eee; border-radius: 2px; overflow: hidden; }
      #splash-fill { height: 100%; width: 0; background: var(--c); border-radius: 2px; animation: splashLoad 0.8s ease forwards; }
      @keyframes splashLoad { 0% { width: 0; } 60% { width: 80%; } 100% { width: 100%; } }

      @media (max-width: 768px) { .desktop-only { display: none !important; } }
      @media (min-width: 769px) { .mobile-nav { display: none !important; } }
    </style>
  </head>
  <body>
    <div id="splash">
      <img src="https://i.ibb.co/qwn4Bwz/Ever-Jpg.jpg" alt="Ever" width="80"
        fetchpriority="high" decoding="sync"
        style="object-fit: contain; border-radius: 18px; display: block;" />
      <div id="splash-bar"><div id="splash-fill"></div></div>
    </div>
    <script>
      var _preImg = new Image();
      _preImg.src = 'https://i.ibb.co/qwn4Bwz/Ever-Jpg.jpg';
      function _hideSplash() {
        var s = document.getElementById('splash');
        if (s) { s.classList.add('hide'); setTimeout(function() { if (s.parentNode) s.parentNode.removeChild(s); }, 350); }
      }
      var _splashTimer = setTimeout(_hideSplash, 1200);
      _preImg.onload = function() { clearTimeout(_splashTimer); setTimeout(_hideSplash, 150); };
      _preImg.onerror = function() { clearTimeout(_splashTimer); setTimeout(_hideSplash, 200); };
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
