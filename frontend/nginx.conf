server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Never cache index.html or version.json so users always get the latest build
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location = /version.json {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Hashed JS/CSS/image assets — cache forever (Vite adds content hash to filenames)
    location ~* \.(?:js|css|woff2?|ttf|eot|ico|svg|png|jpe?g|gif|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $backend "http://backend:8000";
        rewrite ^/api/(.*) /$1 break;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 3s;
        proxy_read_timeout 10s;
    }

    location /static/ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $backend "http://backend:8000";
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 3s;
        proxy_read_timeout 10s;
    }
}

